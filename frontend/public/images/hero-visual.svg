<svg width="500" height="400" viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main container -->
  <rect width="500" height="400" rx="20" fill="url(#gradient1)" opacity="0.1"/>
  
  <!-- AI Brain representation -->
  <circle cx="250" cy="180" r="80" fill="url(#gradient1)" opacity="0.8"/>
  <circle cx="250" cy="180" r="60" fill="none" stroke="#667eea" stroke-width="2" opacity="0.6"/>
  <circle cx="250" cy="180" r="40" fill="none" stroke="#764ba2" stroke-width="2" opacity="0.4"/>
  
  <!-- Neural network connections -->
  <g stroke="#667eea" stroke-width="2" opacity="0.6">
    <line x1="200" y1="140" x2="230" y2="160"/>
    <line x1="300" y1="140" x2="270" y2="160"/>
    <line x1="200" y1="220" x2="230" y2="200"/>
    <line x1="300" y1="220" x2="270" y2="200"/>
    <line x1="180" y1="180" x2="210" y2="180"/>
    <line x1="320" y1="180" x2="290" y2="180"/>
  </g>
  
  <!-- Nodes -->
  <circle cx="200" cy="140" r="8" fill="url(#gradient2)"/>
  <circle cx="300" cy="140" r="8" fill="url(#gradient2)"/>
  <circle cx="200" cy="220" r="8" fill="url(#gradient2)"/>
  <circle cx="300" cy="220" r="8" fill="url(#gradient2)"/>
  <circle cx="180" cy="180" r="8" fill="url(#gradient2)"/>
  <circle cx="320" cy="180" r="8" fill="url(#gradient2)"/>
  
  <!-- Plan/Tasks representation -->
  <g transform="translate(80, 280)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="#667eea" opacity="0.8"/>
    <rect x="10" y="10" width="80" height="8" rx="4" fill="white" opacity="0.9"/>
    <rect x="10" y="25" width="60" height="6" rx="3" fill="white" opacity="0.7"/>
    <rect x="10" y="35" width="70" height="6" rx="3" fill="white" opacity="0.7"/>
    <rect x="10" y="45" width="50" height="6" rx="3" fill="white" opacity="0.5"/>
  </g>
  
  <g transform="translate(220, 300)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="#764ba2" opacity="0.8"/>
    <rect x="10" y="10" width="80" height="8" rx="4" fill="white" opacity="0.9"/>
    <rect x="10" y="25" width="65" height="6" rx="3" fill="white" opacity="0.7"/>
    <rect x="10" y="35" width="55" height="6" rx="3" fill="white" opacity="0.7"/>
    <rect x="10" y="45" width="75" height="6" rx="3" fill="white" opacity="0.5"/>
  </g>
  
  <g transform="translate(360, 280)">
    <rect x="0" y="0" width="100" height="60" rx="8" fill="#f5576c" opacity="0.8"/>
    <rect x="10" y="10" width="80" height="8" rx="4" fill="white" opacity="0.9"/>
    <rect x="10" y="25" width="70" height="6" rx="3" fill="white" opacity="0.7"/>
    <rect x="10" y="35" width="45" height="6" rx="3" fill="white" opacity="0.7"/>
    <rect x="10" y="45" width="60" height="6" rx="3" fill="white" opacity="0.5"/>
  </g>
  
  <!-- Arrows showing flow -->
  <g stroke="#667eea" stroke-width="3" fill="none" marker-end="url(#arrowhead)" opacity="0.7">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
      </marker>
    </defs>
    <path d="M 250 260 Q 150 270 130 300"/>
    <path d="M 250 260 Q 270 280 270 300"/>
    <path d="M 250 260 Q 350 270 410 300"/>
  </g>
  
  <!-- Floating elements for dynamism -->
  <circle cx="100" cy="100" r="4" fill="#f093fb" opacity="0.6"/>
  <circle cx="400" cy="120" r="6" fill="#667eea" opacity="0.5"/>
  <circle cx="450" cy="60" r="3" fill="#764ba2" opacity="0.7"/>
  <circle cx="50" cy="50" r="5" fill="#f5576c" opacity="0.6"/>
  
  <!-- Text element -->
  <text x="250" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#667eea" opacity="0.8">
    VisualAI
  </text>
</svg>
